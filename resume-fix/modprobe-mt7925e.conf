# /etc/modprobe.d/mt7925e.conf
# Force mt7925e to claim the MT7927 PCI ID 14c3:7927 on every modprobe.
# Required because the in-tree mt7925e in 6.17+ has the alias but does not
# always auto-bind the patched DKMS module on first probe — particularly on
# kernel 6.17.0-23+ where the auto-bind is more lenient on -22 than -23.
#
# Source: github.com/reynold-lariza/CachyOS-ASUS-Pro-Art-X870E-WIFI-and-Bluetooth-fix
install mt7925e /sbin/modprobe --ignore-install mt7925e; echo "14c3 7927" > /sys/bus/pci/drivers/mt7925e/new_id
