# /etc/modprobe.d/btusb.conf
# The MT7927 Bluetooth side (chip ID 0489:e13a, internally MT6639) does NOT
# recover from selective USB suspend. Without this option the chip works
# briefly after boot, then gets autosuspended and never wakes back up,
# producing the classic "BT works for a few hours then dies" pattern.
options btusb enable_autosuspend=0
